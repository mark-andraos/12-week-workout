<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="12 Week Workout">
<style>html,body{background:#0a0a0a}</style>
<title>12 Week Workout</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C518;
    --gold-light: #FFD740;
    --gold-dim: #a8890f;
    --black: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --surface3: #222222;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --text-muted: #777;
    --text-dim: #444;
    --green: #4CAF50;
    --red: #e53935;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'Barlow', sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
    overscroll-behavior: none;
  }

  #app { display: flex; flex-direction: column; min-height: 100vh; }
  .screen { display: none; flex-direction: column; flex: 1; padding-bottom: calc(64px + var(--safe-bottom)); }
  .screen.active { display: flex; }

  /* NAV */
  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 0 8px; gap: 4px;
    color: var(--text-dim);
    font-family: var(--font-display);
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer; transition: color 0.2s;
    border: none; background: none;
  }
  .nav-item.active { color: var(--gold); }
  .nav-item svg { width: 22px; height: 22px; }

  /* HEADER */
  .screen-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 14px;
  }
  .screen-header h1 {
    font-family: var(--font-display);
    font-size: 30px; font-weight: 900;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .screen-header .subtitle {
    font-size: 13px; color: var(--gold);
    font-weight: 500; margin-top: 2px;
    font-family: var(--font-display); letter-spacing: 0.5px;
  }

  /* SCROLL */
  .scroll-area { overflow-y: auto; flex: 1; }

  /* BUTTONS */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    border: none; border-radius: 10px;
    font-family: var(--font-display);
    font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s;
    padding: 14px 20px; font-size: 15px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-ghost { background: var(--surface3); color: var(--text); }
  .btn-danger { background: transparent; color: var(--red); border: 1.5px solid var(--red); }
  .btn-full { width: 100%; }
  .btn-sm { padding: 8px 14px; font-size: 13px; border-radius: 8px; }

  /* BADGE */
  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 10px; border-radius: 20px;
    font-family: var(--font-display);
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-gold { background: rgba(245,197,24,0.15); color: var(--gold); border: 1px solid rgba(245,197,24,0.3); }
  .badge-green { background: rgba(76,175,80,0.15); color: var(--green); border: 1px solid rgba(76,175,80,0.3); }
  .badge-grey { background: var(--surface3); color: var(--text-muted); border: 1px solid var(--border); }

  /* LOADING */
  .loading-screen {
    position: fixed; inset: 0; background: var(--black);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 500; gap: 24px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast {
    position: fixed; bottom: calc(74px + var(--safe-bottom));
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 18px;
    font-family: var(--font-display); font-size: 14px; font-weight: 700;
    color: var(--text); white-space: nowrap;
    z-index: 300; opacity: 0; transition: all 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(20px + var(--safe-bottom));
    width: 100%; max-height: 85vh; overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 0 auto 20px;
  }
  .modal-title {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .modal-exercise-name { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* NO START */
  .no-start-card {
    margin: 20px;
    background: var(--surface2);
    border: 1.5px dashed var(--gold-dim);
    border-radius: 16px; padding: 32px 24px; text-align: center;
  }
  .no-start-card h2 {
    font-family: var(--font-display);
    font-size: 24px; font-weight: 900; text-transform: uppercase;
    color: var(--gold); margin-bottom: 8px;
  }
  .no-start-card p { color: var(--text-muted); font-size: 14px; line-height: 1.5; margin-bottom: 20px; }

  /* INPUT */
  .input {
    background: var(--surface3); border: 1.5px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: var(--font-body); font-size: 16px;
    padding: 12px 14px; width: 100%; outline: none; transition: border-color 0.2s;
  }
  .input:focus { border-color: var(--gold); }

  /* LOG SCREEN */
  .log-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
  }
  .log-day-label {
    font-family: var(--font-display);
    font-size: 11px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-muted); margin-bottom: 4px;
  }
  .log-workout-title {
    font-family: var(--font-display);
    font-size: 32px; font-weight: 900;
    text-transform: uppercase; letter-spacing: 0.5px; line-height: 1;
    margin-bottom: 8px;
  }
  .log-workout-title span { color: var(--gold); }
  .log-meta { display: flex; gap: 8px; flex-wrap: wrap; }

  /* PROGRESS BAR */
  .progress-wrap {
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .progress-top {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
  }
  .progress-label {
    font-family: var(--font-display); font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted);
  }
  .progress-value {
    font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--gold);
  }
  .progress-bar-bg { background: var(--surface3); border-radius: 4px; height: 5px; }
  .progress-bar-fill { background: var(--gold); border-radius: 4px; height: 5px; transition: width 0.5s; }

  /* MUSCLE GROUP */
  .muscle-group-header {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 16px 8px;
  }
  .muscle-group-name {
    font-family: var(--font-display); font-size: 12px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted);
    white-space: nowrap;
  }
  .muscle-group-line { flex: 1; height: 1px; background: var(--border); }

  /* EXERCISE CARD */
  .ex-card {
    margin: 0 16px 10px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    display: flex; align-items: center;
    padding: 14px; gap: 14px;
    cursor: pointer; transition: border-color 0.2s;
  }
  .ex-card.logged { border-color: rgba(76,175,80,0.5); }
  .ex-card.skipped { opacity: 0.6; }
  .ex-card:active { transform: scale(0.99); }

  .ex-status {
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .ex-card.logged .ex-status { background: var(--green); border-color: var(--green); }
  .ex-card.skipped .ex-status { background: var(--surface3); border-color: var(--border); }

  .ex-info { flex: 1; min-width: 0; }
  .ex-name {
    font-family: var(--font-display); font-size: 17px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ex-card.logged .ex-name { color: var(--text-muted); }
  .ex-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .ex-weight {
    font-family: var(--font-display); font-size: 22px; font-weight: 900;
    color: var(--gold); white-space: nowrap; flex-shrink: 0;
  }
  .ex-weight.skipped-label { font-size: 13px; color: var(--text-dim); font-weight: 700; }

  /* WEIGHT MODAL */
  .weight-display {
    background: var(--surface3); border-radius: 12px;
    padding: 20px; text-align: center; margin-bottom: 16px;
  }
  .weight-display-value {
    font-family: var(--font-display); font-size: 72px; font-weight: 900;
    color: var(--gold); line-height: 1;
  }
  .weight-display-unit {
    font-family: var(--font-display); font-size: 20px; font-weight: 700;
    color: var(--text-muted); margin-top: 4px;
  }
  .weight-display-reps { font-size: 13px; color: var(--text-muted); margin-top: 8px; }

  /* NUMPAD */
  .numpad {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px;
  }
  .numpad-btn {
    background: var(--surface3);
    border-radius: 10px; color: var(--text);
    font-family: var(--font-display); font-size: 26px; font-weight: 700;
    padding: 18px; cursor: pointer; transition: all 0.1s; border: none;
  }
  .numpad-btn:active { background: var(--border); transform: scale(0.95); }
  .numpad-btn.backspace { font-size: 20px; color: var(--text-muted); }
  .numpad-actions { display: flex; gap: 8px; }

  /* PROGRESS SCREEN */
  .prog-overview {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
  }
  .prog-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--border);
    border-radius: 10px; overflow: hidden; margin-top: 12px;
  }
  .prog-stat { background: var(--surface2); padding: 12px; text-align: center; }
  .prog-stat-val {
    font-family: var(--font-display); font-size: 24px; font-weight: 900; color: var(--gold);
  }
  .prog-stat-label {
    font-family: var(--font-display); font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-top: 2px;
  }

  .ex-progress-item {
    margin: 0 16px 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .ex-progress-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px; cursor: pointer;
  }
  .ex-progress-name {
    font-family: var(--font-display); font-size: 16px; font-weight: 800; text-transform: uppercase;
  }
  .ex-progress-best {
    font-family: var(--font-display); font-size: 20px; font-weight: 900; color: var(--gold);
  }
  .ex-progress-history { display: none; border-top: 1px solid var(--border); }
  .ex-progress-item.open .ex-progress-history { display: block; }
  .ex-progress-item.open { border-color: rgba(245,197,24,0.3); }

  .history-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
  }
  .history-row:last-child { border-bottom: none; }
  .history-date { font-size: 13px; color: var(--text-muted); }
  .history-kg { font-family: var(--font-display); font-size: 18px; font-weight: 800; }
  .history-kg.pr { color: var(--gold); }
  .history-actions { display: flex; gap: 6px; }
  .history-edit-btn {
    font-family: var(--font-display); font-size: 11px; font-weight: 700;
    text-transform: uppercase; padding: 4px 10px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface3); color: var(--text-muted); cursor: pointer;
  }
  .history-delete-btn {
    font-family: var(--font-display); font-size: 11px; font-weight: 700;
    text-transform: uppercase; padding: 4px 10px; border-radius: 6px;
    border: 1px solid rgba(229,57,53,0.3); background: transparent; color: var(--red); cursor: pointer;
  }
  .upcoming-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--border); opacity: 0.4;
  }
  .upcoming-row:last-child { border-bottom: none; }
  .upcoming-date { font-size: 13px; color: var(--text-muted); }
  .upcoming-label {
    font-family: var(--font-display); font-size: 12px; font-weight: 700;
    color: var(--text-dim); text-transform: uppercase;
  }

  /* SETTINGS */
  .settings-section { margin: 16px 16px 0; }
  .settings-section-title {
    font-family: var(--font-display); font-size: 11px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); padding: 0 4px 8px;
  }
  .settings-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 8px;
  }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px; border-bottom: 1px solid var(--border);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row-label {
    font-family: var(--font-display); font-size: 15px; font-weight: 600; text-transform: uppercase;
  }
  .settings-row-value {
    font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--gold);
  }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <img src="/icon.png" style="width:200px;height:200px;object-fit:contain;mix-blend-mode:lighten">
  <div class="spinner"></div>
</div>

<div id="app" style="display:none">

  <!-- LOG -->
  <div class="screen active" id="screen-log">
    <div id="logContent"></div>
  </div>

  <!-- PROGRESS -->
  <div class="screen" id="screen-progress">
    <div class="screen-header">
      <h1>Progress</h1>
      <div class="subtitle">Your strength over time</div>
    </div>
    <div class="scroll-area" id="progressContent"></div>
  </div>

  <!-- SETTINGS -->
  <div class="screen" id="screen-settings">
    <div class="screen-header">
      <h1>Settings</h1>
      <div class="subtitle">Program configuration</div>
    </div>
    <div class="scroll-area" id="settingsContent"></div>
  </div>

  <nav class="nav-bar">
    <button class="nav-item active" onclick="showScreen('log')" id="nav-log">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Log
    </button>
    <button class="nav-item" onclick="showScreen('progress')" id="nav-progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Progress
    </button>
    <button class="nav-item" onclick="showScreen('settings')" id="nav-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
  </nav>
</div>

<!-- WEIGHT MODAL -->
<div class="modal-overlay" id="weightModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalExName"></div>
    <div class="modal-exercise-name" id="modalExMeta"></div>
    <div class="weight-display">
      <div class="weight-display-value" id="weightDisplay">—</div>
      <div class="weight-display-unit">kg</div>
      <div class="weight-display-reps" id="weightRepsHint"></div>
    </div>
    <div class="numpad">
      <button class="numpad-btn" onclick="numpadPress('1')">1</button>
      <button class="numpad-btn" onclick="numpadPress('2')">2</button>
      <button class="numpad-btn" onclick="numpadPress('3')">3</button>
      <button class="numpad-btn" onclick="numpadPress('4')">4</button>
      <button class="numpad-btn" onclick="numpadPress('5')">5</button>
      <button class="numpad-btn" onclick="numpadPress('6')">6</button>
      <button class="numpad-btn" onclick="numpadPress('7')">7</button>
      <button class="numpad-btn" onclick="numpadPress('8')">8</button>
      <button class="numpad-btn" onclick="numpadPress('9')">9</button>
      <button class="numpad-btn" onclick="numpadPress('.')">.</button>
      <button class="numpad-btn" onclick="numpadPress('0')">0</button>
      <button class="numpad-btn backspace" onclick="numpadBackspace()">⌫</button>
    </div>
    <div class="numpad-actions">
      <button class="btn btn-ghost btn-sm" style="flex:1" onclick="skipExercise()">Skip</button>
      <button class="btn btn-gold" style="flex:2" onclick="confirmWeight()">Log Weight</button>
    </div>
  </div>
</div>

<!-- START DATE MODAL -->
<div class="modal-overlay" id="startDateModal" onclick="if(event.target===this)closeStartModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Set Start Date</div>
    <p style="color:var(--text-muted);font-size:14px;margin-bottom:16px;line-height:1.5">Choose the date you'll begin Week 1. Your workouts will fall on Mon / Tue / Thu / Fri each week.</p>
    <label style="font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px">Start Date</label>
    <input type="date" class="input" id="startDateInput" style="margin-bottom:16px">
    <button class="btn btn-gold btn-full" onclick="saveStartDate()">Save &amp; Start Program</button>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeEditModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Weight</div>
    <div class="modal-exercise-name" id="editModalExName"></div>
    <div class="weight-display">
      <div class="weight-display-value" id="editWeightDisplay">—</div>
      <div class="weight-display-unit">kg</div>
    </div>
    <div class="numpad">
      <button class="numpad-btn" onclick="editNumpadPress('1')">1</button>
      <button class="numpad-btn" onclick="editNumpadPress('2')">2</button>
      <button class="numpad-btn" onclick="editNumpadPress('3')">3</button>
      <button class="numpad-btn" onclick="editNumpadPress('4')">4</button>
      <button class="numpad-btn" onclick="editNumpadPress('5')">5</button>
      <button class="numpad-btn" onclick="editNumpadPress('6')">6</button>
      <button class="numpad-btn" onclick="editNumpadPress('7')">7</button>
      <button class="numpad-btn" onclick="editNumpadPress('8')">8</button>
      <button class="numpad-btn" onclick="editNumpadPress('9')">9</button>
      <button class="numpad-btn" onclick="editNumpadPress('.')">.</button>
      <button class="numpad-btn" onclick="editNumpadPress('0')">0</button>
      <button class="numpad-btn backspace" onclick="editNumpadBackspace()">⌫</button>

      <button class="btn btn-danger btn-sm" style="flex:1" onclick="deleteLog()">Delete</button>
      <button class="btn btn-gold" style="flex:2" onclick="saveEditWeight()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbw2XJgKy9qIyU5dDniY-2su9-N2AamdrQa3NV-r9hb_IRiu4HnKNr1AqgskV7ggW5Ze/exec';
const WORKOUT_DAYS = [1, 2, 4, 5];
const WORKOUT_SHORT = ['', 'CHEST & TRIS', 'BACK & BIS', 'SHOULDERS', 'LEGS'];

let config = {};
let sessions = [];
let allLogs = [];
let currentWorkoutExercises = [];
let currentSessionId = null;
let currentSessionInfo = null;
let numpadValue = '';
let activeExercise = null;
let editLogId = null;
let editSessionId = null;
let editExerciseName = null;
let editNumpadValue = '';

async function api(action, data = {}) {
  const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action, ...data }) });
  return res.json();
}

async function init() {
  try {
    const [cfg, sess] = await Promise.all([
      api('getConfig'),
      api('getSessions')
    ]);
    config = cfg || {};
    sessions = Array.isArray(sess) ? sess : [];
  } catch (e) {
    showToast('Connection error', 'error');
  }
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderLog();
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'progress') renderProgress();
  if (name === 'settings') renderSettings();
}

// DATE HELPERS
function toDateStr(d) {
  // Use local date to avoid timezone shifting
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}
function parseDate(str) {
  if (!str) return null;
  // Strip time portion if present (e.g. 2026-05-16T14:00:00.000Z -> 2026-05-16)
  const dateOnly = String(str).split('T')[0];
  const [y, m, d] = dateOnly.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function formatDate(str) {
  if (!str) return '';
  return parseDate(str).toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
}
function today() { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

// PROGRAM LOGIC
function getAllWorkoutDays(startDate) {
  const days = [];
  let workoutCount = 0;
  let d = new Date(startDate);
  while (workoutCount < 48) {
    if (WORKOUT_DAYS.includes(d.getDay())) {
      const weekIndex = Math.floor(workoutCount / 4);
      const programWeek = weekIndex + 1;
      const phase = Math.ceil(programWeek / 4);
      const weekInPhase = ((programWeek - 1) % 4) + 1;
      const workoutNum = (workoutCount % 4) + 1;
      days.push({ date: toDateStr(d), phase, weekInPhase, programWeek, workoutNum, workoutIndex: workoutCount });
      workoutCount++;
    }
    d = new Date(d.getTime() + 86400000);
  }
  return days;
}

function getCompletedKeys() {
  return new Set(sessions.filter(s => s.completed == true || s.completed === 'TRUE').map(s => s.date + '_' + s.workout_num));
}

function getCompletedCount() { return getCompletedKeys().size; }

function getNextWorkout(startDate) {
  const allDays = getAllWorkoutDays(startDate);
  const completed = getCompletedKeys();
  return allDays.find(d => !completed.has(d.date + '_' + d.workoutNum)) || null;
}

// LOG SCREEN
async function renderLog() {
  const el = document.getElementById('logContent');
  if (!config.program_start_date) {
    el.innerHTML = `
      <div class="screen-header"><h1>Log</h1><div class="subtitle">Today's workout</div></div>
      <div class="no-start-card">
        <h2>Set Your Start Date</h2>
        <p>Choose when you're beginning the program and your full 12-week schedule will be mapped out automatically.</p>
        <button class="btn btn-gold btn-full" onclick="openStartModal()">Set Start Date</button>
      </div>`;
    return;
  }

  const startDate = parseDate(config.program_start_date);
  const nextWorkout = getNextWorkout(startDate);
  const completedCount = getCompletedCount();
  const pct = Math.round((completedCount / 48) * 100);

  if (!nextWorkout) {
    el.innerHTML = `<div class="screen-header"><h1>Log</h1></div><div class="empty-state"><p>🏆 You've completed all 48 workouts!<br>Incredible work.</p></div>`;
    return;
  }

  const t = today();
  const workoutDate = parseDate(nextWorkout.date);
  const isPast = workoutDate < t;
  const isToday = toDateStr(workoutDate) === toDateStr(t);
  const dayLabel = isPast ? `Missed · ${formatDate(nextWorkout.date)}` : isToday ? `Today · ${formatDate(nextWorkout.date)}` : `Next · ${formatDate(nextWorkout.date)}`;

  el.innerHTML = `
    <div class="log-header">
      <div class="log-day-label">${dayLabel}</div>
      <div class="log-workout-title">Workout <span>${nextWorkout.workoutNum}</span></div>
      <div class="log-meta">
        <span class="badge badge-gold">${WORKOUT_SHORT[nextWorkout.workoutNum]}</span>
        <span class="badge badge-grey">Phase ${nextWorkout.phase} · Week ${nextWorkout.weekInPhase}</span>
        <span class="badge badge-grey">Session ${nextWorkout.workoutIndex + 1} of 48</span>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-top">
        <div class="progress-label">Program Progress</div>
        <div class="progress-value">${completedCount} / 48</div>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="scroll-area" id="exerciseList">
      <div style="display:flex;align-items:center;justify-content:center;padding:60px"><div class="spinner"></div></div>
    </div>`;

  try {
    const exercises = await api('getWorkout', { phase: nextWorkout.phase, week: nextWorkout.weekInPhase, workout_num: nextWorkout.workoutNum });

    let session = sessions.find(s => s.date === nextWorkout.date && Number(s.workout_num) === nextWorkout.workoutNum);
    if (!session) {
      const res = await api('createSession', { phase: nextWorkout.phase, week: nextWorkout.weekInPhase, workout_num: nextWorkout.workoutNum, date: nextWorkout.date });
      session = { session_id: res.session_id, date: nextWorkout.date, workout_num: nextWorkout.workoutNum, phase: nextWorkout.phase, week: nextWorkout.weekInPhase, completed: false };
      sessions.push(session);
    }

    currentSessionId = session.session_id;
    currentSessionInfo = nextWorkout;
    currentWorkoutExercises = exercises;

    const logs = await api('getSessionLogs', { session_id: currentSessionId });
    allLogs = logs || [];

    renderExerciseList(exercises, allLogs);
  } catch (e) {
    document.getElementById('exerciseList').innerHTML = `<div class="empty-state"><p>Failed to load workout.<br>Check your connection.</p></div>`;
  }
}

function renderExerciseList(exercises, logs) {
  const el = document.getElementById('exerciseList');
  if (!exercises || exercises.length === 0) { el.innerHTML = `<div class="empty-state"><p>No exercises found.</p></div>`; return; }

  const groups = {};
  exercises.forEach(ex => { if (!groups[ex.muscle_group]) groups[ex.muscle_group] = []; groups[ex.muscle_group].push(ex); });

  const logMap = {};
  logs.forEach(l => { logMap[l.exercise] = l; });

  let html = '';
  Object.entries(groups).forEach(([group, exList]) => {
    html += `<div class="muscle-group-header"><div class="muscle-group-name">${group}</div><div class="muscle-group-line"></div></div>`;
    exList.forEach(ex => {
      const log = logMap[ex.exercise];
      const isSkipped = log && log.notes === 'skipped';
      const isLogged = log && !isSkipped;
      const isPlank = ex.exercise.toLowerCase().includes('plank');
      const repLabel = isPlank ? `${ex.reps_min}s hold · ${ex.sets} sets` : `${ex.reps_min}–${ex.reps_max} reps · ${ex.sets} sets`;
      const cardId = 'ex_' + ex.exercise.replace(/[^a-z0-9]/gi, '_');

      let statusIcon = `<span style="font-size:13px;font-weight:800;color:var(--text-dim)">+</span>`;
      let weightDisplay = '';
      let cardClass = '';

      if (isLogged) {
        cardClass = 'logged';
        statusIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;
        weightDisplay = isPlank ? `<div class="ex-weight">✓</div>` : `<div class="ex-weight">${log.weight_kg}<span style="font-size:13px;color:var(--text-muted)">kg</span></div>`;
      } else if (isSkipped) {
        cardClass = 'skipped';
        statusIcon = `<span style="font-size:16px;color:var(--text-dim)">—</span>`;
        weightDisplay = `<div class="ex-weight skipped-label">Skipped</div>`;
      }

      html += `<div class="ex-card ${cardClass}" id="${cardId}" onclick="openWeightModal('${encodeURIComponent(ex.exercise)}',${ex.reps_min},${ex.reps_max},${ex.sets},'${ex.muscle_group}',${isPlank})">
        <div class="ex-status">${statusIcon}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.exercise}</div>
          <div class="ex-meta">${repLabel}</div>
        </div>
        ${weightDisplay}
      </div>`;
    });
  });

  const allDone = exercises.every(ex => !!logMap[ex.exercise]);

  html += `<div style="padding:16px">
    <button class="btn btn-gold btn-full" onclick="completeWorkout()">✓ Complete Workout</button>
    <div style="text-align:center;margin-top:10px;font-size:12px;color:var(--text-dim)">Can complete without logging every exercise</div>
  </div><div style="height:8px"></div>`;

  el.innerHTML = html;

  if (allDone) {
    const s = sessions.find(s => s.session_id === currentSessionId);
    if (s && s.completed != true && s.completed !== 'TRUE') completeWorkout(true);
  }
}

// WEIGHT MODAL
function openWeightModal(encodedEx, repsMin, repsMax, sets, group, isPlank) {
  const exercise = decodeURIComponent(encodedEx);
  const existing = allLogs.find(l => l.exercise === exercise);
  activeExercise = { exercise, repsMin, repsMax, sets, group, isPlank };
  numpadValue = (existing && existing.notes !== 'skipped' && existing.weight_kg > 0) ? String(existing.weight_kg) : '';
  document.getElementById('modalExName').textContent = exercise;
  document.getElementById('modalExMeta').textContent = isPlank ? `${repsMin}s hold · ${sets} sets` : `${repsMin}–${repsMax} reps · ${sets} sets`;
  document.getElementById('weightRepsHint').textContent = isPlank ? 'Tap Log or Skip to mark complete' : `Target: ${repsMin}–${repsMax} reps`;
  updateWeightDisplay();
  document.getElementById('weightModal').classList.add('open');
}

function closeModal() { document.getElementById('weightModal').classList.remove('open'); activeExercise = null; numpadValue = ''; }
function numpadPress(val) { if (val === '.' && numpadValue.includes('.')) return; if (numpadValue.length >= 6) return; numpadValue += val; updateWeightDisplay(); }
function numpadBackspace() { numpadValue = numpadValue.slice(0, -1); updateWeightDisplay(); }
function updateWeightDisplay() { document.getElementById('weightDisplay').textContent = numpadValue || '—'; }

async function confirmWeight() {
  if (!numpadValue && !activeExercise.isPlank) { showToast('Enter a weight', 'error'); return; }
  const kg = activeExercise.isPlank ? 0 : parseFloat(numpadValue);
  await logExercise(activeExercise.exercise, kg, '');
  closeModal();
}

async function skipExercise() { await logExercise(activeExercise.exercise, 0, 'skipped'); closeModal(); }

async function logExercise(exercise, weight_kg, notes) {
  // 1. Update UI immediately (optimistic)
  const existing = allLogs.find(l => l.exercise === exercise);
  const tempId = 'temp_' + Date.now();
  allLogs = allLogs.filter(l => l.exercise !== exercise);
  allLogs.push({ log_id: tempId, session_id: currentSessionId, exercise, weight_kg, notes });
  renderExerciseList(currentWorkoutExercises, allLogs);
  showToast(notes === 'skipped' ? 'Skipped' : `${weight_kg}kg logged ✓`, notes === 'skipped' ? '' : 'success');

  // 2. Save to API in background
  try {
    if (existing && existing.log_id && !existing.log_id.startsWith('temp_')) {
      await api('deleteLog', { log_id: existing.log_id });
    }
    const res = await api('logSet', { session_id: currentSessionId, exercise, set_num: 1, reps: activeExercise ? activeExercise.repsMax : 0, weight_kg, notes });
    // Replace temp ID with real one
    const entry = allLogs.find(l => l.log_id === tempId);
    if (entry) entry.log_id = res.log_id;
  } catch (e) {
    // Revert on failure
    allLogs = allLogs.filter(l => l.log_id !== tempId);
    if (existing) allLogs.push(existing);
    renderExerciseList(currentWorkoutExercises, allLogs);
    showToast('Failed to save — try again', 'error');
  }
}

async function completeWorkout(silent = false) {
  try {
    await api('completeSession', { session_id: currentSessionId });
    const s = sessions.find(s => s.session_id === currentSessionId);
    if (s) s.completed = true;
    if (!silent) { showToast('Workout complete! 💪', 'success'); setTimeout(() => renderLog(), 1200); }
  } catch (e) { if (!silent) showToast('Failed to save', 'error'); }
}

// PROGRESS
async function renderProgress() {
  const el = document.getElementById('progressContent');
  el.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;padding:60px"><div class="spinner"></div></div>`;
  const completedCount = getCompletedCount();
  const pct = Math.round((completedCount / 48) * 100);

  try {
    const logs = await api('getLogs', {});

    const logsByEx = {};
    (logs || []).forEach(l => {
      if (l.notes === 'skipped') return;
      if (!logsByEx[l.exercise]) logsByEx[l.exercise] = [];
      logsByEx[l.exercise].push(l);
    });

    const sessionDateMap = {};
    sessions.forEach(s => { sessionDateMap[s.session_id] = s.date; });

    const knownExercises = [
      { name: 'Bench Press', group: 'Chest' }, { name: 'Incline Bench Press', group: 'Chest' },
      { name: 'Squat', group: 'Legs' }, { name: 'Romanian Deadlift', group: 'Legs' }, { name: 'Leg Extension', group: 'Legs' },
      { name: 'Dumbbell Bent-Over Row', group: 'Back' }, { name: 'Wide-Grip Pulldown', group: 'Back' }, { name: 'Seated Cable Row', group: 'Back' },
      { name: 'Barbell Curl', group: 'Biceps' }, { name: 'Dumbbell Shoulder Press', group: 'Shoulders' },
      { name: 'Triceps Pressdown', group: 'Triceps' }, { name: 'Dumbbell Shrug', group: 'Traps' },
      { name: 'Standing Calf Raise', group: 'Calves' }, { name: 'Seated Calf Raise', group: 'Calves' },
    ];
    Object.keys(logsByEx).forEach(ex => { if (!knownExercises.find(e => e.name === ex)) knownExercises.push({ name: ex, group: 'Other' }); });

    const overviewHTML = `<div class="prog-overview">
      <div class="progress-top">
        <div class="progress-label">Program Progress</div>
        <div class="progress-value">${completedCount} / 48 · ${pct}%</div>
      </div>
      <div class="progress-bar-bg" style="margin-top:10px"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="prog-stats">
        <div class="prog-stat"><div class="prog-stat-val">${completedCount}</div><div class="prog-stat-label">Done</div></div>
        <div class="prog-stat"><div class="prog-stat-val">${48 - completedCount}</div><div class="prog-stat-label">Left</div></div>
        <div class="prog-stat"><div class="prog-stat-val">${pct}%</div><div class="prog-stat-label">Complete</div></div>
      </div>
    </div>`;

    let exerciseHTML = '';
    knownExercises.forEach(({ name, group }) => {
      const exLogs = (logsByEx[name] || []).map(l => ({ ...l, date: sessionDateMap[l.session_id] || '' })).filter(l => l.date).sort((a, b) => b.date.localeCompare(a.date));
      const weights = exLogs.map(l => Number(l.weight_kg)).filter(w => w > 0);
      const bestKg = weights.length ? Math.max(...weights) : null;
      const cardId = `prog_${name.replace(/[^a-z0-9]/gi, '_')}`;

      const pastRows = exLogs.length
        ? exLogs.map(l => {
            const isPR = Number(l.weight_kg) === bestKg && bestKg > 0;
            return `<div class="history-row">
              <div class="history-date">${formatDate(l.date)}</div>
              <div class="history-kg ${isPR ? 'pr' : ''}">${l.weight_kg}kg${isPR ? ' 🏆' : ''}</div>
              <div class="history-actions">
                <button class="history-edit-btn" onclick="openEditModal('${l.log_id}','${encodeURIComponent(name)}',${l.weight_kg},event)">Edit</button>
                <button class="history-delete-btn" onclick="deleteLogById('${l.log_id}',event)">Del</button>
              </div>
            </div>`;
          }).join('')
        : `<div class="history-row"><div class="history-date" style="color:var(--text-dim)">No data yet</div></div>`;

      exerciseHTML += `<div class="ex-progress-item" id="${cardId}">
        <div class="ex-progress-header" onclick="toggleProgressCard('${cardId}')">
          <div>
            <div class="ex-progress-name">${name}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${group}</div>
          </div>
          <div class="ex-progress-best">${bestKg !== null ? bestKg + 'kg' : '—'}</div>
        </div>
        <div class="ex-progress-history">${pastRows}</div>
      </div>`;
    });

    el.innerHTML = overviewHTML
      + `<div style="padding:16px 16px 8px;font-family:var(--font-display);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted)">Exercises</div>`
      + exerciseHTML
      + `<div style="height:16px"></div>`;
  } catch (e) { el.innerHTML = `<div class="empty-state"><p>Failed to load progress.</p></div>`; }
}

function toggleProgressCard(id) { document.getElementById(id)?.classList.toggle('open'); }

// EDIT / DELETE
function openEditModal(logId, encodedEx, currentKg, event) {
  event.stopPropagation();
  editLogId = logId;
  editExerciseName = decodeURIComponent(encodedEx);
  editNumpadValue = String(currentKg);
  document.getElementById('editModalExName').textContent = editExerciseName;
  document.getElementById('editWeightDisplay').textContent = editNumpadValue;
  document.getElementById('editModal').classList.add('open');
}
function closeEditModal() { document.getElementById('editModal').classList.remove('open'); editLogId = null; }
function editNumpadPress(val) { if (val === '.' && editNumpadValue.includes('.')) return; if (editNumpadValue.length >= 6) return; editNumpadValue += val; document.getElementById('editWeightDisplay').textContent = editNumpadValue || '—'; }
function editNumpadBackspace() { editNumpadValue = editNumpadValue.slice(0, -1); document.getElementById('editWeightDisplay').textContent = editNumpadValue || '—'; }

async function saveEditWeight() {
  if (!editNumpadValue) { showToast('Enter a weight', 'error'); return; }
  try {
    await api('deleteLog', { log_id: editLogId });
    // Re-log with same session — find session from current logs
    const allLogsRes = await api('getLogs', {});
    showToast('Saved ✓', 'success');
    closeEditModal();
    renderProgress();
  } catch (e) { showToast('Failed to save', 'error'); }
}

async function deleteLog() {
  try { await api('deleteLog', { log_id: editLogId }); showToast('Deleted', ''); closeEditModal(); renderProgress(); }
  catch (e) { showToast('Failed', 'error'); }
}

async function deleteLogById(logId, event) {
  event.stopPropagation();
  if (!confirm('Delete this entry?')) return;
  try { await api('deleteLog', { log_id: logId }); showToast('Deleted', ''); renderProgress(); }
  catch (e) { showToast('Failed', 'error'); }
}

// SETTINGS
function renderSettings() {
  const completedCount = getCompletedCount();
  const currentPhase = completedCount < 16 ? 1 : completedCount < 32 ? 2 : 3;
  const weekInPhase = Math.ceil(((completedCount % 16) || 16) / 4);
  document.getElementById('settingsContent').innerHTML = `
    <div class="settings-section" style="padding-top:16px">
      <div class="settings-section-title">Program</div>
      <div class="settings-item">
        <div class="settings-row" onclick="openStartModal()" style="cursor:pointer">
          <div class="settings-row-label">Start Date</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="settings-row-value">${config.program_start_date ? formatDate(config.program_start_date) : 'Not set'}</div>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
        <div class="settings-row"><div class="settings-row-label">Schedule</div><div class="settings-row-value">Mon/Tue/Thu/Fri</div></div>
        <div class="settings-row"><div class="settings-row-label">Current Phase</div><div class="settings-row-value">${config.program_start_date ? 'Phase ' + currentPhase : '—'}</div></div>
        <div class="settings-row"><div class="settings-row-label">Phase Week</div><div class="settings-row-value">${config.program_start_date ? 'Week ' + weekInPhase + ' of 4' : '—'}</div></div>
        <div class="settings-row"><div class="settings-row-label">Sessions Done</div><div class="settings-row-value">${completedCount} / 48</div></div>
      </div>
    </div><div style="height:16px"></div>`;
}

// START DATE MODAL
function openStartModal() {
  document.getElementById('startDateInput').value = config.program_start_date || '';
  document.getElementById('startDateModal').classList.add('open');
}
function closeStartModal() { document.getElementById('startDateModal').classList.remove('open'); }
async function saveStartDate() {
  const val = document.getElementById('startDateInput').value;
  if (!val) { showToast('Pick a date', 'error'); return; }
  try {
    await api('setConfig', { key: 'program_start_date', value: val });
    config.program_start_date = val;
    closeStartModal();
    showToast('Start date saved!', 'success');
    renderLog();
  } catch (e) { showToast('Failed to save', 'error'); }
}

// TOAST
let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// Service worker disabled for stability

init();
</script>
