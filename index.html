<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="12 Week Workout">
<style>html,body{background:#0a0a0a}</style>
<title>12 Week Workout</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C518;
    --gold-light: #FFD740;
    --gold-dim: #a8890f;
    --black: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --surface3: #222222;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --text-muted: #777;
    --text-dim: #444;
    --green: #4CAF50;
    --red: #e53935;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'Barlow', sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--black); color:var(--text); font-family:var(--font-body); min-height:100vh; overflow-x:hidden; overscroll-behavior:none; }
  #app { display:flex; flex-direction:column; min-height:100vh; }
  .screen { display:none; flex-direction:column; flex:1; padding-bottom:calc(62px + var(--safe-bottom)); }
  .screen.active { display:flex; }

  /* NAV */
  .nav-bar { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); display:flex; padding-bottom:var(--safe-bottom); z-index:100; }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:8px 0 6px; gap:3px; color:var(--text-dim); font-family:var(--font-display); font-size:10px; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; cursor:pointer; transition:color 0.2s; border:none; background:none; }
  .nav-item.active { color:var(--gold); }
  .nav-item svg { width:20px; height:20px; }

  /* HEADER */
  .screen-header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 20px 12px; }
  .screen-header h1 { font-family:var(--font-display); font-size:28px; font-weight:900; letter-spacing:1px; text-transform:uppercase; }
  .screen-header .subtitle { font-size:12px; color:var(--gold); font-weight:500; margin-top:2px; font-family:var(--font-display); letter-spacing:0.5px; }

  .scroll-area { overflow-y:auto; flex:1; }

  /* BUTTONS */
  .btn { display:flex; align-items:center; justify-content:center; gap:8px; border:none; border-radius:10px; font-family:var(--font-display); font-weight:700; letter-spacing:0.5px; text-transform:uppercase; cursor:pointer; transition:all 0.15s; padding:14px 20px; font-size:15px; }
  .btn:active { transform:scale(0.97); }
  .btn-gold { background:var(--gold); color:#000; }
  .btn-ghost { background:var(--surface3); color:var(--text); }
  .btn-danger { background:transparent; color:var(--red); border:1.5px solid var(--red); }
  .btn-full { width:100%; }
  .btn-sm { padding:8px 14px; font-size:13px; border-radius:8px; }

  /* BADGES */
  .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-family:var(--font-display); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
  .badge-gold { background:rgba(245,197,24,0.15); color:var(--gold); border:1px solid rgba(245,197,24,0.3); }
  .badge-green { background:rgba(76,175,80,0.15); color:var(--green); border:1px solid rgba(76,175,80,0.3); }
  .badge-grey { background:var(--surface3); color:var(--text-muted); border:1px solid var(--border); }

  /* LOADING */
  .loading-screen { position:fixed; inset:0; background:var(--black); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:500; gap:24px; }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* TOAST */
  .toast { position:fixed; bottom:calc(72px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 18px; font-family:var(--font-display); font-size:14px; font-weight:700; color:var(--text); white-space:nowrap; z-index:300; opacity:0; transition:all 0.3s; pointer-events:none; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:var(--green); color:var(--green); }
  .toast.error { border-color:var(--red); color:var(--red); }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; align-items:flex-end; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px 20px 0 0; padding:20px 20px calc(20px + var(--safe-bottom)); width:100%; max-height:85vh; overflow-y:auto; animation:slideUp 0.25s ease; }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  .modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
  .modal-title { font-family:var(--font-display); font-size:22px; font-weight:900; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
  .modal-sub { font-size:13px; color:var(--text-muted); margin-bottom:20px; }

  /* INPUT */
  .input { background:var(--surface3); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-family:var(--font-body); font-size:16px; padding:12px 14px; width:100%; outline:none; transition:border-color 0.2s; }
  .input:focus { border-color:var(--gold); }

  /* EMPTY / NO START */
  .empty-state { text-align:center; padding:48px 24px; color:var(--text-muted); }
  .empty-state p { font-size:14px; line-height:1.6; }
  .no-start-card { margin:20px; background:var(--surface2); border:1.5px dashed var(--gold-dim); border-radius:16px; padding:32px 24px; text-align:center; }
  .no-start-card h2 { font-family:var(--font-display); font-size:24px; font-weight:900; text-transform:uppercase; color:var(--gold); margin-bottom:8px; }
  .no-start-card p { color:var(--text-muted); font-size:14px; line-height:1.5; margin-bottom:20px; }

  /* ══ TRAIN SCREEN ══ */
  .train-header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 20px; }
  .train-day-label { font-family:var(--font-display); font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:2px; color:var(--text-muted); margin-bottom:4px; }
  .train-title { font-family:var(--font-display); font-size:30px; font-weight:900; text-transform:uppercase; line-height:1; margin-bottom:8px; }
  .train-title span { color:var(--gold); }
  .train-meta { display:flex; gap:8px; flex-wrap:wrap; }

  .progress-wrap { padding:12px 20px; background:var(--surface); border-bottom:1px solid var(--border); }
  .progress-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
  .progress-label { font-family:var(--font-display); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); }
  .progress-value { font-family:var(--font-display); font-size:12px; font-weight:700; color:var(--gold); }
  .progress-bar-bg { background:var(--surface3); border-radius:4px; height:4px; }
  .progress-bar-fill { background:var(--gold); border-radius:4px; height:4px; transition:width 0.5s; }

  .muscle-group-header { display:flex; align-items:center; gap:10px; padding:14px 16px 8px; }
  .muscle-group-name { font-family:var(--font-display); font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:2px; color:var(--text-muted); white-space:nowrap; }
  .muscle-group-line { flex:1; height:1px; background:var(--border); }

  .ex-card { margin:0 16px 10px; background:var(--surface2); border:1.5px solid var(--border); border-radius:12px; display:flex; align-items:center; padding:14px; gap:14px; cursor:pointer; transition:border-color 0.2s; }
  .ex-card.logged { border-color:rgba(76,175,80,0.5); }
  .ex-card.skipped { opacity:0.6; }
  .ex-card:active { transform:scale(0.99); }
  .ex-status { width:30px; height:30px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; }
  .ex-card.logged .ex-status { background:var(--green); border-color:var(--green); }
  .ex-card.skipped .ex-status { background:var(--surface3); border-color:var(--border); }
  .ex-info { flex:1; min-width:0; }
  .ex-name { font-family:var(--font-display); font-size:17px; font-weight:800; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ex-card.logged .ex-name { color:var(--text-muted); }
  .ex-meta { font-size:12px; color:var(--text-muted); margin-top:2px; }
  .ex-weight { font-family:var(--font-display); font-size:22px; font-weight:900; color:var(--gold); white-space:nowrap; flex-shrink:0; }
  .ex-weight.skip-lbl { font-size:13px; color:var(--text-dim); font-weight:700; }

  /* WEIGHT MODAL */
  .weight-display { background:var(--surface3); border-radius:12px; padding:20px; text-align:center; margin-bottom:16px; }
  .weight-val { font-family:var(--font-display); font-size:72px; font-weight:900; color:var(--gold); line-height:1; }
  .weight-unit { font-family:var(--font-display); font-size:18px; font-weight:700; color:var(--text-muted); margin-top:4px; }
  .weight-hint { font-size:13px; color:var(--text-muted); margin-top:6px; }
  .numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
  .numpad-btn { background:var(--surface3); border-radius:10px; color:var(--text); font-family:var(--font-display); font-size:26px; font-weight:700; padding:18px; cursor:pointer; transition:all 0.1s; border:none; }
  .numpad-btn:active { background:var(--border); transform:scale(0.95); }
  .numpad-btn.backspace { font-size:20px; color:var(--text-muted); }
  .numpad-actions { display:flex; gap:8px; }

  /* ══ TIMELINE SCREEN ══ */
  .timeline-overview { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 20px; }
  .tl-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--border); border-radius:10px; overflow:hidden; margin-top:12px; }
  .tl-stat { background:var(--surface2); padding:12px; text-align:center; }
  .tl-stat-val { font-family:var(--font-display); font-size:24px; font-weight:900; color:var(--gold); }
  .tl-stat-label { font-family:var(--font-display); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-top:2px; }

  .phase-block { margin:12px 16px 0; border-radius:12px; overflow:hidden; border:1.5px solid var(--border); }
  .phase-block.current { border-color:rgba(245,197,24,0.4); }
  .phase-block.complete { border-color:rgba(76,175,80,0.3); }

  .phase-header { display:flex; align-items:center; padding:14px 16px; gap:14px; cursor:pointer; background:var(--surface2); }
  .phase-num { font-family:var(--font-display); font-size:40px; font-weight:900; color:var(--text-dim); line-height:1; min-width:36px; }
  .phase-block.current .phase-num { color:var(--gold); }
  .phase-block.complete .phase-num { color:var(--green); }
  .phase-info { flex:1; }
  .phase-name { font-family:var(--font-display); font-size:18px; font-weight:900; text-transform:uppercase; }
  .phase-sub { font-size:12px; color:var(--text-muted); margin-top:2px; }
  .phase-progress-wrap { flex-shrink:0; text-align:right; }
  .phase-progress-num { font-family:var(--font-display); font-size:13px; font-weight:800; color:var(--gold); }
  .phase-chevron { color:var(--text-dim); transition:transform 0.2s; flex-shrink:0; }
  .phase-block.open .phase-chevron { transform:rotate(180deg); }

  .phase-weeks { display:none; border-top:1px solid var(--border); }
  .phase-block.open .phase-weeks { display:block; }

  .week-row { display:flex; align-items:center; padding:12px 16px; border-bottom:1px solid var(--border); gap:12px; }
  .week-row:last-child { border-bottom:none; }
  .week-row.current-week { background:rgba(245,197,24,0.05); }
  .week-dot { width:10px; height:10px; border-radius:50%; background:var(--border); flex-shrink:0; }
  .week-row.done .week-dot { background:var(--green); }
  .week-row.current-week .week-dot { background:var(--gold); }
  .week-info { flex:1; }
  .week-label { font-family:var(--font-display); font-size:15px; font-weight:800; text-transform:uppercase; }
  .week-row.current-week .week-label { color:var(--gold); }
  .week-reps { font-size:12px; color:var(--text-muted); margin-top:2px; }
  .week-status { font-family:var(--font-display); font-size:12px; font-weight:700; text-transform:uppercase; }
  .week-row.done .week-status { color:var(--green); }
  .week-row.current-week .week-status { color:var(--gold); }
  .week-row .week-status { color:var(--text-dim); }

  .week-dots { display:flex; gap:6px; margin-top:6px; }
  .week-dot-session { width:10px; height:10px; border-radius:50%; background:var(--surface3); border:1.5px solid var(--border); flex-shrink:0; }
  .week-dot-session.done { background:var(--green); border-color:var(--green); }
  .week-dot-session.next { background:var(--gold); border-color:var(--gold); }

  /* ══ PBs SCREEN ══ */
  .pb-workout-section { margin:12px 16px 0; }
  .pb-workout-header { display:flex; align-items:center; gap:10px; padding:4px 0 10px; }
  .pb-workout-title { font-family:var(--font-display); font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:2px; color:var(--text-muted); white-space:nowrap; }
  .pb-workout-line { flex:1; height:1px; background:var(--border); }

  .pb-card { background:var(--surface2); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:10px; }
  .pb-card-header { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; cursor:pointer; }
  .pb-card.open { border-color:rgba(245,197,24,0.3); }
  .pb-ex-name { font-family:var(--font-display); font-size:16px; font-weight:800; text-transform:uppercase; }
  .pb-ex-group { font-size:11px; color:var(--text-muted); margin-top:2px; }

  .pb-cols { display:flex; gap:12px; }
  .pb-col { text-align:center; }
  .pb-col-val { font-family:var(--font-display); font-size:20px; font-weight:900; color:var(--gold); }
  .pb-col-val.empty { color:var(--text-dim); font-size:16px; }
  .pb-col-label { font-family:var(--font-display); font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-top:2px; white-space:nowrap; }

  .pb-history { display:none; border-top:1px solid var(--border); }
  .pb-card.open .pb-history { display:block; }
  .pb-history-row { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid var(--border); }
  .pb-history-row:last-child { border-bottom:none; }
  .pb-history-date { font-size:12px; color:var(--text-muted); }
  .pb-history-detail { display:flex; align-items:center; gap:6px; }
  .pb-history-kg { font-family:var(--font-display); font-size:18px; font-weight:800; }
  .pb-history-kg.pr { color:var(--gold); }
  .pb-history-week { font-family:var(--font-display); font-size:10px; font-weight:700; color:var(--text-dim); text-transform:uppercase; }
  .pb-actions { display:flex; gap:6px; }
  .pb-edit-btn { font-family:var(--font-display); font-size:11px; font-weight:700; text-transform:uppercase; padding:4px 10px; border-radius:6px; border:1px solid var(--border); background:var(--surface3); color:var(--text-muted); cursor:pointer; }
  .pb-del-btn { font-family:var(--font-display); font-size:11px; font-weight:700; text-transform:uppercase; padding:4px 10px; border-radius:6px; border:1px solid rgba(229,57,53,0.3); background:transparent; color:var(--red); cursor:pointer; }

  /* ══ PROGRAM SCREEN ══ */
  .prog-section { margin:14px 16px 0; }
  .prog-section-title { font-family:var(--font-display); font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:2px; color:var(--text-muted); padding:0 4px 8px; }
  .prog-item { background:var(--surface2); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:8px; }
  .prog-row { display:flex; align-items:center; justify-content:space-between; padding:15px 16px; border-bottom:1px solid var(--border); }
  .prog-row:last-child { border-bottom:none; }
  .prog-row-label { font-family:var(--font-display); font-size:15px; font-weight:600; text-transform:uppercase; }
  .prog-row-value { font-family:var(--font-display); font-size:15px; font-weight:700; color:var(--gold); }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <img src="/icon.png" style="width:200px;height:200px;object-fit:contain;mix-blend-mode:lighten">
  <div class="spinner"></div>
</div>

<div id="app" style="display:none">

  <!-- TRAIN -->
  <div class="screen active" id="screen-train">
    <div id="trainContent"></div>
  </div>

  <!-- TIMELINE -->
  <div class="screen" id="screen-timeline">
    <div class="screen-header">
      <h1>Timeline</h1>
      <div class="subtitle">Your 12-week journey</div>
    </div>
    <div class="scroll-area" id="timelineContent"></div>
  </div>

  <!-- PBs -->
  <div class="screen" id="screen-pbs">
    <div class="screen-header">
      <h1>PBs</h1>
      <div class="subtitle">Personal bests</div>
    </div>
    <div class="scroll-area" id="pbsContent"></div>
  </div>

  <!-- PROGRAM -->
  <div class="screen" id="screen-program">
    <div class="screen-header">
      <h1>Program</h1>
      <div class="subtitle">Configuration</div>
    </div>
    <div class="scroll-area" id="programContent"></div>
  </div>

  <nav class="nav-bar">
    <button class="nav-item active" onclick="showScreen('train')" id="nav-train">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      Train
    </button>
    <button class="nav-item" onclick="showScreen('timeline')" id="nav-timeline">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Timeline
    </button>
    <button class="nav-item" onclick="showScreen('pbs')" id="nav-pbs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      PBs
    </button>
    <button class="nav-item" onclick="showScreen('program')" id="nav-program">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Program
    </button>
  </nav>
</div>

<!-- WEIGHT MODAL -->
<div class="modal-overlay" id="weightModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalExName"></div>
    <div class="modal-sub" id="modalExMeta"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbw2XJgKy9qIyU5dDniY-2su9-N2AamdrQa3NV-r9hb_IRiu4HnKNr1AqgskV7ggW5Ze/exec';
const WORKOUT_DAYS = [1, 2, 4, 5];
const WORKOUT_SHORT = ['', 'CHEST & TRIS', 'BACK & BIS', 'SHOULDERS', 'LEGS'];
const WORKOUT_FULL = ['', 'Chest, Triceps & Calves', 'Back, Biceps & Abs', 'Shoulders, Traps & Calves', 'Legs & Abs'];
const WEEK_REPS = { 1: '12–15 reps', 2: '9–11 reps', 3: '6–8 reps', 4: '3–5 reps' };
const WEEK_TECHNIQUE = { 1: 'Rest-pause', 2: 'Rest-pause', 3: 'Drop sets', 4: 'Drop sets' };

// Primary exercises per workout for PBs
const PRIMARY_EXERCISES = [
  { workout: 1, name: 'Bench Press', group: 'Chest' },
  { workout: 1, name: 'Triceps Pressdown', group: 'Triceps' },
  { workout: 1, name: 'Standing Calf Raise', group: 'Calves' },
  { workout: 2, name: 'Dumbbell Bent-Over Row', group: 'Back' },
  { workout: 2, name: 'Barbell Curl', group: 'Biceps' },
  { workout: 3, name: 'Dumbbell Shoulder Press', group: 'Shoulders' },
  { workout: 3, name: 'Dumbbell Shrug', group: 'Traps' },
  { workout: 3, name: 'Seated Calf Raise', group: 'Calves' },
  { workout: 4, name: 'Squat', group: 'Legs' },
  { workout: 4, name: 'Romanian Deadlift', group: 'Legs' },
];

let config = {};
let sessions = [];
let allLogs = [];
let currentWorkoutExercises = [];
let currentSessionId = null;
let currentSessionInfo = null;
let numpadValue = '';
let activeExercise = null;
let editLogId = null;
let editExerciseName = null;
let editNumpadValue = '';

async function api(action, data = {}) {
  const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action, ...data }) });
  return res.json();
}

async function init() {
  try {
    const [cfg, sess] = await Promise.all([api('getConfig'), api('getSessions')]);
    config = cfg || {};
    sessions = Array.isArray(sess) ? sess : [];
  } catch (e) { showToast('Connection error', 'error'); }
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderTrain();
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'timeline') renderTimeline();
  if (name === 'pbs') renderPBs();
  if (name === 'program') renderProgram();
}

// ── DATE HELPERS ──────────────────────────────────────────────────
function toDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}
function parseDate(str) {
  if (!str) return null;
  const dateOnly = String(str).split('T')[0];
  const [y, m, d] = dateOnly.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function formatDate(str) {
  if (!str) return '';
  return parseDate(str).toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
}
function today() { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

// ── PROGRAM LOGIC ─────────────────────────────────────────────────
function getAllWorkoutDays(startDate) {
  const days = [];
  let count = 0;
  let d = new Date(startDate);
  while (count < 48) {
    if (WORKOUT_DAYS.includes(d.getDay())) {
      const weekIndex = Math.floor(count / 4);
      const programWeek = weekIndex + 1;
      const phase = Math.ceil(programWeek / 4);
      const weekInPhase = ((programWeek - 1) % 4) + 1;
      const workoutNum = (count % 4) + 1;
      days.push({ date: toDateStr(d), phase, weekInPhase, programWeek, workoutNum, workoutIndex: count });
      count++;
    }
    d = new Date(d.getTime() + 86400000);
  }
  return days;
}

function getCompletedKeys() {
  return new Set(
    sessions
      .filter(s => s.completed == true || s.completed === 'TRUE')
      .map(s => String(s.date).split('T')[0] + '_' + s.workout_num)
  );
}
function getCompletedCount() { return getCompletedKeys().size; }
function getNextWorkout(startDate) {
  const allDays = getAllWorkoutDays(startDate);
  const completed = getCompletedKeys();
  return allDays.find(d => !completed.has(d.date + '_' + d.workoutNum)) || null;
}

// ── TRAIN SCREEN ──────────────────────────────────────────────────
async function renderTrain() {
  const el = document.getElementById('trainContent');

  if (!config.program_start_date) {
    el.innerHTML = `
      <div class="screen-header"><h1>Train</h1><div class="subtitle">Today's workout</div></div>
      <div class="no-start-card">
        <h2>Set Your Start Date</h2>
        <p>Choose when you're beginning the program and your 12-week schedule will be mapped out automatically.</p>
        <button class="btn btn-gold btn-full" onclick="openStartModal()">Set Start Date</button>
      </div>`;
    return;
  }

  const startDate = parseDate(config.program_start_date);
  const nextWorkout = getNextWorkout(startDate);
  const completedCount = getCompletedCount();
  const pct = Math.round((completedCount / 48) * 100);

  if (!nextWorkout) {
    el.innerHTML = `<div class="screen-header"><h1>Train</h1></div><div class="empty-state"><p>🏆 You've completed all 48 workouts!<br>Incredible work.</p></div>`;
    return;
  }

  const t = today();
  const workoutDate = parseDate(nextWorkout.date);
  const isPast = workoutDate < t;
  const isToday = toDateStr(workoutDate) === toDateStr(t);
  const dayLabel = isPast ? `Missed · ${formatDate(nextWorkout.date)}` : isToday ? `Today · ${formatDate(nextWorkout.date)}` : `Next · ${formatDate(nextWorkout.date)}`;

  el.innerHTML = `
    <div class="train-header">
      <div class="train-day-label">${dayLabel}</div>
      <div class="train-title">Workout <span>${nextWorkout.workoutNum}</span></div>
      <div class="train-meta">
        <span class="badge badge-gold">${WORKOUT_SHORT[nextWorkout.workoutNum]}</span>
        <span class="badge badge-grey">Phase ${nextWorkout.phase} · Week ${nextWorkout.weekInPhase}</span>
        <span class="badge badge-grey">${WEEK_REPS[nextWorkout.weekInPhase]}</span>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-top">
        <div class="progress-label">Program Progress</div>
        <div class="progress-value">${completedCount} / 48 · ${pct}%</div>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="scroll-area" id="exerciseList">
      <div style="display:flex;align-items:center;justify-content:center;padding:60px"><div class="spinner"></div></div>
    </div>`;

  try {
    const exercises = await api('getWorkout', { phase: nextWorkout.phase, week: nextWorkout.weekInPhase, workout_num: nextWorkout.workoutNum });

    let session = sessions.find(s =>
      String(s.date).split('T')[0] === nextWorkout.date &&
      Number(s.workout_num) === nextWorkout.workoutNum
    );
    if (!session) {
      const res = await api('createSession', { phase: nextWorkout.phase, week: nextWorkout.weekInPhase, workout_num: nextWorkout.workoutNum, date: nextWorkout.date });
      session = { session_id: res.session_id, date: nextWorkout.date, workout_num: nextWorkout.workoutNum, phase: nextWorkout.phase, week: nextWorkout.weekInPhase, completed: false };
      sessions.push(session);
    }

    currentSessionId = session.session_id;
    currentSessionInfo = nextWorkout;
    currentWorkoutExercises = exercises;

    const logs = await api('getSessionLogs', { session_id: currentSessionId });
    allLogs = logs || [];
    renderExerciseList(exercises, allLogs);
  } catch (e) {
    document.getElementById('exerciseList').innerHTML = `<div class="empty-state"><p>Failed to load workout.<br>Check your connection.</p></div>`;
  }
}

function renderExerciseList(exercises, logs) {
  const el = document.getElementById('exerciseList');
  if (!exercises || exercises.length === 0) { el.innerHTML = `<div class="empty-state"><p>No exercises found.</p></div>`; return; }

  const groups = {};
  exercises.forEach(ex => { if (!groups[ex.muscle_group]) groups[ex.muscle_group] = []; groups[ex.muscle_group].push(ex); });

  const logMap = {};
  logs.forEach(l => { logMap[l.exercise] = l; });

  let html = '';
  Object.entries(groups).forEach(([group, exList]) => {
    html += `<div class="muscle-group-header"><div class="muscle-group-name">${group}</div><div class="muscle-group-line"></div></div>`;
    exList.forEach(ex => {
      const log = logMap[ex.exercise];
      const isSkipped = log && log.notes === 'skipped';
      const isLogged = log && !isSkipped;
      const isPlank = ex.exercise.toLowerCase().includes('plank');
      const repLabel = isPlank ? `${ex.reps_min}s hold · ${ex.sets} sets` : `${ex.reps_min}–${ex.reps_max} reps · ${ex.sets} sets`;

      let statusIcon = `<span style="font-size:13px;font-weight:800;color:var(--text-dim)">+</span>`;
      let weightDisplay = '';
      let cardClass = '';

      if (isLogged) {
        cardClass = 'logged';
        statusIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;
        weightDisplay = isPlank ? `<div class="ex-weight">✓</div>` : `<div class="ex-weight">${log.weight_kg}<span style="font-size:13px;color:var(--text-muted)">kg</span></div>`;
      } else if (isSkipped) {
        cardClass = 'skipped';
        statusIcon = `<span style="font-size:16px;color:var(--text-dim)">—</span>`;
        weightDisplay = `<div class="ex-weight skip-lbl">Skipped</div>`;
      }

      html += `<div class="ex-card ${cardClass}" onclick="openWeightModal('${encodeURIComponent(ex.exercise)}',${ex.reps_min},${ex.reps_max},${ex.sets},'${ex.muscle_group}',${isPlank})">
        <div class="ex-status">${statusIcon}</div>
        <div class="ex-info"><div class="ex-name">${ex.exercise}</div><div class="ex-meta">${repLabel}</div></div>
        ${weightDisplay}
      </div>`;
    });
  });

  const allDone = exercises.every(ex => !!logMap[ex.exercise]);
  html += `<div style="padding:16px">
    <button class="btn btn-gold btn-full" onclick="completeWorkout()">✓ Complete Workout</button>
    <div style="text-align:center;margin-top:10px;font-size:12px;color:var(--text-dim)">Can complete without logging every exercise</div>
  </div><div style="height:8px"></div>`;

  el.innerHTML = html;
  if (allDone) {
    const s = sessions.find(s => s.session_id === currentSessionId);
    if (s && s.completed != true && s.completed !== 'TRUE') completeWorkout(true);
  }
}

// ── WEIGHT MODAL ──────────────────────────────────────────────────
function openWeightModal(encodedEx, repsMin, repsMax, sets, group, isPlank) {
  const exercise = decodeURIComponent(encodedEx);
  const existing = allLogs.find(l => l.exercise === exercise);
  activeExercise = { exercise, repsMin, repsMax, sets, group, isPlank };
  numpadValue = (existing && existing.notes !== 'skipped' && Number(existing.weight_kg) > 0) ? String(existing.weight_kg) : '';
  document.getElementById('modalExName').textContent = exercise;
  document.getElementById('modalExMeta').textContent = isPlank ? `${repsMin}s hold · ${sets} sets` : `${repsMin}–${repsMax} reps · ${sets} sets`;
  document.getElementById('weightHint').textContent = isPlank ? 'Tap Log or Skip to mark complete' : `Target: ${repsMin}–${repsMax} reps`;
  document.getElementById('weightDisplay').textContent = numpadValue || '—';
  document.getElementById('weightModal').classList.add('open');
}
function closeModal() { document.getElementById('weightModal').classList.remove('open'); activeExercise = null; numpadValue = ''; }
function numpadPress(val) { if (val === '.' && numpadValue.includes('.')) return; if (numpadValue.length >= 6) return; numpadValue += val; document.getElementById('weightDisplay').textContent = numpadValue || '—'; }
function numpadBackspace() { numpadValue = numpadValue.slice(0, -1); document.getElementById('weightDisplay').textContent = numpadValue || '—'; }

async function confirmWeight() {
  if (!numpadValue && !activeExercise.isPlank) { showToast('Enter a weight', 'error'); return; }
  const kg = activeExercise.isPlank ? 0 : parseFloat(numpadValue);
  const ex = { ...activeExercise };
  closeModal();
  await logExercise(ex.exercise, kg, '', ex);
}
async function skipExercise() {
  const ex = { ...activeExercise };
  closeModal();
  await logExercise(ex.exercise, 0, 'skipped', ex);
}

async function logExercise(exercise, weight_kg, notes, exObj) {
  // Optimistic UI update
  const existing = allLogs.find(l => l.exercise === exercise);
  const tempId = 'temp_' + Date.now();
  allLogs = allLogs.filter(l => l.exercise !== exercise);
  allLogs.push({ log_id: tempId, session_id: currentSessionId, exercise, weight_kg, notes });
  renderExerciseList(currentWorkoutExercises, allLogs);
  showToast(notes === 'skipped' ? 'Skipped' : `${weight_kg}kg logged ✓`, notes === 'skipped' ? '' : 'success');

  try {
    if (existing && existing.log_id && !String(existing.log_id).startsWith('temp_')) {
      await api('deleteLog', { log_id: existing.log_id });
    }
    const res = await api('logSet', { session_id: currentSessionId, exercise, set_num: 1, reps: exObj ? exObj.repsMax : 0, weight_kg, notes });
    const entry = allLogs.find(l => l.log_id === tempId);
    if (entry) entry.log_id = res.log_id;
  } catch (e) {
    allLogs = allLogs.filter(l => l.log_id !== tempId);
    if (existing) allLogs.push(existing);
    renderExerciseList(currentWorkoutExercises, allLogs);
    showToast('Failed to save — try again', 'error');
  }
}

async function completeWorkout(silent = false) {
  try {
    await api('completeSession', { session_id: currentSessionId });
    const s = sessions.find(s => s.session_id === currentSessionId);
    if (s) s.completed = true;
    if (!silent) { showToast('Workout complete! 💪', 'success'); setTimeout(() => renderTrain(), 1200); }
  } catch (e) { if (!silent) showToast('Failed to save', 'error'); }
}

// ── TIMELINE SCREEN ───────────────────────────────────────────────
function renderTimeline() {
  const el = document.getElementById('timelineContent');
  if (!config.program_start_date) {
    el.innerHTML = `<div class="empty-state"><p>Set a start date in Program to see your timeline.</p></div>`;
    return;
  }

  const startDate = parseDate(config.program_start_date);
  const allDays = getAllWorkoutDays(startDate);
  const completed = getCompletedKeys();
  const completedCount = completed.size;
  const pct = Math.round((completedCount / 48) * 100);

  // Current phase and week
  const currentDay = allDays.find(d => !completed.has(d.date + '_' + d.workoutNum));
  const currentPhase = currentDay ? currentDay.phase : 3;
  const currentProgramWeek = currentDay ? currentDay.programWeek : 12;

  const overviewHTML = `
    <div class="timeline-overview">
      <div class="progress-top">
        <div class="progress-label">Overall Progress</div>
      </div>
      <div class="progress-bar-bg" style="margin-top:6px"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="tl-stats">
        <div class="tl-stat"><div class="tl-stat-val">${completedCount}</div><div class="tl-stat-label">Workouts Done</div></div>
        <div class="tl-stat"><div class="tl-stat-val">${48 - completedCount}</div><div class="tl-stat-label">Workouts Left</div></div>
        <div class="tl-stat"><div class="tl-stat-val">${pct}%</div><div class="tl-stat-label">Complete</div></div>
      </div>
    </div>`;

  let phasesHTML = '';
  for (let phase = 1; phase <= 3; phase++) {
    const phaseWeeks = [1, 2, 3, 4].map(w => {
      const programWeek = (phase - 1) * 4 + w;
      const weekDays = allDays.filter(d => d.programWeek === programWeek);
      const doneCount = weekDays.filter(d => completed.has(d.date + '_' + d.workoutNum)).length;
      const isCurrent = programWeek === currentProgramWeek;
      const isDone = doneCount === 4;
      return { w, programWeek, weekDays, doneCount, isCurrent, isDone };
    });

    const phaseDone = phaseWeeks.reduce((sum, w) => sum + w.doneCount, 0);
    const isCurrentPhase = phase === currentPhase;
    const isCompletePhase = phaseDone === 16;
    const phaseClass = isCompletePhase ? 'complete' : isCurrentPhase ? 'current' : '';
    const isOpen = isCurrentPhase || isCompletePhase;

    const weeksHTML = phaseWeeks.map(({ w, weekDays, doneCount, isCurrent, isDone }) => {
      const weekClass = isDone ? 'done' : isCurrent ? 'current-week' : '';
      const statusText = isDone ? '✓ Complete' : isCurrent ? 'In Progress' : doneCount > 0 ? `${doneCount}/4` : 'Upcoming';
      // Build 4 session dots
      const dotsHTML = [1,2,3,4].map(wn => {
        const day = weekDays.find(d => d.workoutNum === wn);
        const isDoneDay = day && completed.has(day.date + '_' + day.workoutNum);
        const isNextDay = !isDoneDay && day && currentDay && day.date === currentDay.date && day.workoutNum === currentDay.workoutNum;
        const cls = isDoneDay ? 'done' : isNextDay ? 'next' : '';
        return `<div class="week-dot-session ${cls}"></div>`;
      }).join('');

      return `<div class="week-row ${weekClass}">
        <div class="week-dot"></div>
        <div class="week-info">
          <div class="week-label">Week ${w}</div>
          <div class="week-reps">${WEEK_REPS[w]} · ${WEEK_TECHNIQUE[w]}</div>
          <div class="week-dots">${dotsHTML}</div>
        </div>
        <div class="week-status">${statusText}</div>
      </div>`;
    }).join('');

    phasesHTML += `
      <div class="phase-block ${phaseClass} ${isOpen ? 'open' : ''}" id="phase-block-${phase}">
        <div class="phase-header" onclick="togglePhase(${phase})">
          <div class="phase-num">${phase}</div>
          <div class="phase-info">
            <div class="phase-name">Phase ${phase}</div>
            <div class="phase-sub">Weeks ${(phase-1)*4+1}–${phase*4} · ${phaseDone}/16 sessions</div>
          </div>
          <div class="phase-progress-wrap">
            <div class="phase-progress-num">${Math.round((phaseDone/16)*100)}%</div>
          </div>
          <svg class="phase-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="phase-weeks">${weeksHTML}</div>
      </div>`;
  }

  el.innerHTML = overviewHTML + `<div style="padding:12px 0 0">${phasesHTML}</div><div style="height:16px"></div>`;
}

function togglePhase(phase) {
  document.getElementById('phase-block-' + phase)?.classList.toggle('open');
}

// ── PBs SCREEN ────────────────────────────────────────────────────
async function renderPBs() {
  const el = document.getElementById('pbsContent');
  el.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;padding:60px"><div class="spinner"></div></div>`;

  try {
    const logs = await api('getLogs', {});
    const sessionMap = {};
    sessions.forEach(s => { sessionMap[s.session_id] = s; });

    // Build log map: exercise -> array of { kg, date, phase, weekInPhase, session }
    const logsByEx = {};
    (logs || []).forEach(l => {
      if (l.notes === 'skipped' || Number(l.weight_kg) <= 0) return;
      const sess = sessionMap[l.session_id];
      if (!sess) return;
      const dateStr = String(sess.date).split('T')[0];
      if (!logsByEx[l.exercise]) logsByEx[l.exercise] = [];
      logsByEx[l.exercise].push({
        log_id: l.log_id,
        kg: Number(l.weight_kg),
        date: dateStr,
        phase: Number(sess.phase),
        weekInPhase: Number(sess.week),
        session_id: l.session_id
      });
    });

    // Group by workout
    const byWorkout = { 1: [], 2: [], 3: [], 4: [] };
    PRIMARY_EXERCISES.forEach(ex => byWorkout[ex.workout].push(ex));

    let html = '';
    for (let w = 1; w <= 4; w++) {
      html += `<div class="pb-workout-section">
        <div class="pb-workout-header">
          <div class="pb-workout-title">Workout ${w} — ${WORKOUT_SHORT[w]}</div>
          <div class="pb-workout-line"></div>
        </div>`;

      byWorkout[w].forEach(({ name, group }) => {
        const exLogs = (logsByEx[name] || []).sort((a, b) => b.date.localeCompare(a.date));
        const allKgs = exLogs.map(l => l.kg);
        const overallBest = allKgs.length ? Math.max(...allKgs) : null;

        // Week 1 PB (12-15 reps) and Week 4 PB (3-5 reps)
        const w1Logs = exLogs.filter(l => l.weekInPhase === 1);
        const w4Logs = exLogs.filter(l => l.weekInPhase === 4);
        const w1Best = w1Logs.length ? Math.max(...w1Logs.map(l => l.kg)) : null;
        const w4Best = w4Logs.length ? Math.max(...w4Logs.map(l => l.kg)) : null;

        const cardId = `pb_${name.replace(/[^a-z0-9]/gi, '_')}`;

        const historyRows = exLogs.length
          ? exLogs.map(l => {
              const isPR = l.kg === overallBest;
              return `<div class="pb-history-row">
                <div>
                  <div class="pb-history-date">${formatDate(l.date)}</div>
                  <div class="pb-history-week" style="margin-top:2px">Phase ${l.phase} · Week ${l.weekInPhase} · ${WEEK_REPS[l.weekInPhase]}</div>
                </div>
                <div class="pb-history-detail">
                  <div class="pb-history-kg ${isPR ? 'pr' : ''}">${l.kg}kg${isPR ? ' 🏆' : ''}</div>
                  <div class="pb-actions">
                    <button class="pb-edit-btn" onclick="openEditModal('${l.log_id}','${encodeURIComponent(name)}',${l.kg},event)">Edit</button>
                    <button class="pb-del-btn" onclick="deleteLogById('${l.log_id}',event)">Del</button>
                  </div>
                </div>
              </div>`;
            }).join('')
          : `<div class="pb-history-row"><div class="pb-history-date" style="color:var(--text-dim)">No data yet</div></div>`;

        html += `<div class="pb-card" id="${cardId}">
          <div class="pb-card-header" onclick="togglePBCard('${cardId}')">
            <div>
              <div class="pb-ex-name">${name}</div>
              <div class="pb-ex-group">${group}</div>
            </div>
            <div class="pb-cols">
              <div class="pb-col">
                <div class="pb-col-val ${w1Best === null ? 'empty' : ''}">${w1Best !== null ? w1Best + 'kg' : '—'}</div>
                <div class="pb-col-label">12–15 reps</div>
              </div>
              <div class="pb-col">
                <div class="pb-col-val ${w4Best === null ? 'empty' : ''}">${w4Best !== null ? w4Best + 'kg' : '—'}</div>
                <div class="pb-col-label">3–5 reps</div>
              </div>
            </div>
          </div>
          <div class="pb-history">${historyRows}</div>
        </div>`;
      });

      html += `</div>`;
    }

    el.innerHTML = html + `<div style="height:16px"></div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><p>Failed to load PBs.</p></div>`;
  }
}

function togglePBCard(id) { document.getElementById(id)?.classList.toggle('open'); }

// ── EDIT / DELETE ─────────────────────────────────────────────────
function openEditModal(logId, encodedEx, currentKg, event) {
  event.stopPropagation();
  editLogId = logId;
  editExerciseName = decodeURIComponent(encodedEx);
  editNumpadValue = String(currentKg);
  document.getElementById('editModalExName').textContent = editExerciseName;
  document.getElementById('editWeightDisplay').textContent = editNumpadValue;
  document.getElementById('editModal').classList.add('open');
}
function closeEditModal() { document.getElementById('editModal').classList.remove('open'); editLogId = null; }
function editNumpadPress(val) { if (val === '.' && editNumpadValue.includes('.')) return; if (editNumpadValue.length >= 6) return; editNumpadValue += val; document.getElementById('editWeightDisplay').textContent = editNumpadValue || '—'; }
function editNumpadBackspace() { editNumpadValue = editNumpadValue.slice(0, -1); document.getElementById('editWeightDisplay').textContent = editNumpadValue || '—'; }

async function saveEditWeight() {
  if (!editNumpadValue) { showToast('Enter a weight', 'error'); return; }
  try {
    await api('deleteLog', { log_id: editLogId });
    showToast('Saved ✓', 'success');
    closeEditModal();
    renderPBs();
  } catch (e) { showToast('Failed to save', 'error'); }
}
async function deleteLog() {
  try { await api('deleteLog', { log_id: editLogId }); showToast('Deleted', ''); closeEditModal(); renderPBs(); }
  catch (e) { showToast('Failed', 'error'); }
}
async function deleteLogById(logId, event) {
  event.stopPropagation();
  if (!confirm('Delete this entry?')) return;
  try { await api('deleteLog', { log_id: logId }); showToast('Deleted', ''); renderPBs(); }
  catch (e) { showToast('Failed', 'error'); }
}

// ── PROGRAM SCREEN ────────────────────────────────────────────────
function renderProgram() {
  const completedCount = getCompletedCount();
  const currentPhase = completedCount < 16 ? 1 : completedCount < 32 ? 2 : 3;
  const weekInPhase = Math.ceil(((completedCount % 16) || 16) / 4);
  document.getElementById('programContent').innerHTML = `
    <div class="prog-section" style="padding-top:4px">
      <div class="prog-section-title">Configuration</div>
      <div class="prog-item">
        <div class="prog-row" onclick="openStartModal()" style="cursor:pointer">
          <div class="prog-row-label">Start Date</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="prog-row-value">${config.program_start_date ? formatDate(config.program_start_date) : 'Not set'}</div>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
        <div class="prog-row"><div class="prog-row-label">Schedule</div><div class="prog-row-value">Mon / Tue / Thu / Fri</div></div>
        <div class="prog-row"><div class="prog-row-label">Units</div><div class="prog-row-value">Kilograms</div></div>
      </div>
    </div>
    <div class="prog-section">
      <div class="prog-section-title">Status</div>
      <div class="prog-item">
        <div class="prog-row"><div class="prog-row-label">Current Phase</div><div class="prog-row-value">${config.program_start_date ? 'Phase ' + currentPhase : '—'}</div></div>
        <div class="prog-row"><div class="prog-row-label">Phase Week</div><div class="prog-row-value">${config.program_start_date ? 'Week ' + weekInPhase + ' of 4' : '—'}</div></div>
        <div class="prog-row"><div class="prog-row-label">Sessions Done</div><div class="prog-row-value">${completedCount} / 48</div></div>
        <div class="prog-row"><div class="prog-row-label">Sessions Left</div><div class="prog-row-value">${48 - completedCount}</div></div>
      </div>
    </div>
    <div style="height:16px"></div>`;
}

// ── START DATE MODAL ──────────────────────────────────────────────
function openStartModal() {
  document.getElementById('startDateInput').value = config.program_start_date || '';
  document.getElementById('startDateModal').classList.add('open');
}
function closeStartModal() { document.getElementById('startDateModal').classList.remove('open'); }
async function saveStartDate() {
  const val = document.getElementById('startDateInput').value;
  if (!val) { showToast('Pick a date', 'error'); return; }
  try {
    await api('setConfig', { key: 'program_start_date', value: val });
    config.program_start_date = val;
    closeStartModal();
    showToast('Start date saved!', 'success');
    renderTrain();
  } catch (e) { showToast('Failed to save', 'error'); }
}

// ── TOAST ─────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

init();
</script>
